map $http_origin $pae_backend_origin {
    default http://localhost:5173;
    "${PUBLIC_FRONTEND_ORIGIN}" $http_origin;
}

server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_gateway http://nginx-gateway:3000;
    set $frontend_app http://frontend:5173;

    client_max_body_size 50M;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "PAE demo proxy is healthy\n";
    }

    location /api/ {
        proxy_pass $api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $pae_backend_origin;
        proxy_read_timeout 120s;
    }

    location /learning-socket/ {
        proxy_pass $api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $pae_backend_origin;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /uploads/ {
        proxy_pass $api_gateway;
        proxy_set_header Host $host;
        proxy_set_header Origin $pae_backend_origin;
    }

    location / {
        proxy_pass $frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
