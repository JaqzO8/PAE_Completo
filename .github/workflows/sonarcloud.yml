name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarcloud:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/services/content-service/package-lock.json
            backend/services/exam-service/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install content-service dependencies
        working-directory: backend/services/content-service
        run: npm ci

      - name: Run content-service tests with coverage
        working-directory: backend/services/content-service
        run: npm test -- --coverage --runInBand

      - name: Run exam-service condition coverage tests
        run: npx jest backend/services/exam-service/src/tests/liveAnswerRules.conditionCoverage.test.js --runInBand --verbose --no-color -t "test_c1"

      - name: Verify coverage files
        run: |
          test -f backend/services/content-service/coverage/lcov.info
          echo "Coverage file found."

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=jaqzo8
            -Dsonar.projectKey=JaqzO8_PAE_Completo
            -Dsonar.projectName=PAE_Completo
            -Dsonar.sources=frontend/src,backend/services
            -Dsonar.tests=backend/services/content-service/src/tests,backend/services/exam-service/src/tests
            -Dsonar.javascript.lcov.reportPaths=backend/services/content-service/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/uploads/**,**/*.html
            -Dsonar.test.inclusions=**/*.test.js,**/*.spec.js
