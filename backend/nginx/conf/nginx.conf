# -----------------------------------------------------
# Eventos: conexiones concurrentes
# -----------------------------------------------------
events {
    worker_connections 1024;
}

http {

    # =================================================
    # MIME TYPES - IMPORTANTE PARA SERVIR IMÁGENES
    # =================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =================================================
    # UPSTREAMS (Servicios Docker)
    # =================================================
    upstream auth_service {
        server auth-service:3001;
    }

    upstream content_service {
        server content-service:3003;
    }

    # =================================================
    # LOGS
    # =================================================
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # =================================================
    # SERVIDOR PRINCIPAL (API GATEWAY)
    # =================================================
    server {
        listen 3000;
        server_name localhost;

        # Tamaño máximo de subida (50 MB)
        client_max_body_size 50M;

        # Timeouts para evitar cortes en requests largos
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Headers estándar para microservicios
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # =================================================
        # HEALTH CHECK DEL GATEWAY
        # =================================================
        location /health {
            access_log off;
            return 200 "Gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # =================================================
        # ARCHIVOS ESTÁTICOS - UPLOADS (DEBE IR PRIMERO)
        # =================================================
        # Esta es la ruta CRÍTICA para servir imágenes
        location /uploads/ {
            # Proxy pass al content service que tiene acceso a los archivos
            proxy_pass http://content_service;
            proxy_redirect off;
            
            # Headers para archivos estáticos
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Cache para mejorar performance
            proxy_cache_valid 200 1d;
            proxy_cache_bypass $http_pragma $http_authorization;
            
            # CORS para imágenes
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            
            # Log para debugging
            access_log /var/log/nginx/uploads_access.log;
            error_log /var/log/nginx/uploads_error.log;
        }

        # =================================================
        # AUTH SERVICE
        # =================================================
        location /api/auth {
            proxy_pass http://auth_service;
            proxy_redirect off;
        }

        # =================================================
        # CONTENT SERVICE
        # =================================================

        # Ruta específica primero
        location /api/content/stats {
            proxy_pass http://content_service;
            proxy_redirect off;
        }

        # Rutas generales de content
        location /api/content {
            proxy_pass http://content_service;
            proxy_redirect off;

            # Configuración especial para uploads
            client_max_body_size 50M;
            proxy_request_buffering off;
        }

        # =================================================
        # MANEJO DE ERRORES
        # =================================================

        # Servicios caídos o no disponibles
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            return 503 '{"success": false, "message": "Servicio temporalmente no disponible"}';
            add_header Content-Type application/json;
        }

        # Archivo demasiado grande
        error_page 413 /413.json;
        location = /413.json {
            return 413 '{"success": false, "message": "Archivo demasiado grande. Máximo 50MB"}';
            add_header Content-Type application/json;
        }

        # Archivo no encontrado
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"success": false, "message": "Recurso no encontrado"}';
            add_header Content-Type application/json;
        }
    }
}