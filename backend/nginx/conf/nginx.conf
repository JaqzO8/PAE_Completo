# -----------------------------------------------------
# Eventos: conexiones concurrentes
# -----------------------------------------------------
events {
    worker_connections 4096;
    multi_accept on;
}

http {

    # =================================================
    # MIME TYPES - IMPORTANTE PARA SERVIR IMÁGENES
    # =================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # =================================================
    # UPSTREAMS (Servicios Docker)
    # =================================================
    upstream auth_service {
        server auth-service:3001;
        keepalive 64;
    }

    upstream content_service {
        server content-service:3003;
        keepalive 64;
    }

    upstream community_service {
        server community-service:3002;
        keepalive 64;
    }

    upstream exam_service {
        server exam-service:3004;
        keepalive 128;
    }

    # =================================================
    # LOGS
    # =================================================
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=400r/s;
    limit_req_zone $binary_remote_addr zone=auth_per_ip:20m rate=400r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

    # =================================================
    # SERVIDOR PRINCIPAL (API GATEWAY)
    # =================================================
    server {
        listen 3000;
        server_name localhost;

        # Tamaño máximo de subida (50 MB)
        client_max_body_size 50M;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # Timeouts para evitar cortes en requests largos
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Headers estándar para microservicios
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        limit_conn conn_per_ip 500;

        # =================================================
        # HEALTH CHECK DEL GATEWAY
        # =================================================
        location /health {
            access_log off;
            return 200 "Gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # =================================================
        # ARCHIVOS ESTÁTICOS - UPLOADS (DEBE IR PRIMERO)
        # =================================================
        # Esta es la ruta CRÍTICA para servir imágenes
        location /uploads/ {
            # Proxy pass al content service que tiene acceso a los archivos
            proxy_pass http://content_service;
            proxy_redirect off;
            
            # Headers para archivos estáticos
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Cache para mejorar performance
            proxy_cache_valid 200 1d;
            proxy_cache_bypass $http_pragma $http_authorization;
            
            # CORS para imágenes
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            
            # Log para debugging
            access_log /var/log/nginx/uploads_access.log;
            error_log /var/log/nginx/uploads_error.log;
        }

        # =================================================
        # AUTH SERVICE
        # =================================================
        location /api/auth {
            limit_req zone=auth_per_ip burst=800 nodelay;
            proxy_pass http://auth_service;
            proxy_redirect off;
        }

        # =================================================
        # CONTENT SERVICE
        # =================================================

        # Ruta específica primero
        location /api/content/stats {
            proxy_pass http://content_service;
            proxy_redirect off;
        }

        # Rutas generales de content
        location /api/content {
            limit_req zone=api_per_ip burst=800 nodelay;
            proxy_pass http://content_service;
            proxy_redirect off;

            # Configuración especial para uploads
            client_max_body_size 50M;
            proxy_request_buffering off;
        }

        # =================================================
        # COMMUNITY SERVICE
        # =================================================
        location /api/community {
            limit_req zone=api_per_ip burst=800 nodelay;
            proxy_pass http://community_service;
            proxy_redirect off;

            client_max_body_size 50M;
            proxy_request_buffering off;
        }

        # =================================================
        # EXAM / LEARNING SERVICE
        # =================================================
        location /api/learning {
            limit_req zone=api_per_ip burst=800 nodelay;
            proxy_pass http://exam_service;
            proxy_redirect off;
        }

        location /learning-socket/ {
            proxy_pass http://exam_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
            proxy_redirect off;
        }

        # =================================================
        # MANEJO DE ERRORES
        # =================================================

        # Servicios caídos o no disponibles
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            return 503 '{"success": false, "message": "Servicio temporalmente no disponible"}';
            add_header Content-Type application/json;
        }

        # Archivo demasiado grande
        error_page 413 /413.json;
        location = /413.json {
            return 413 '{"success": false, "message": "Archivo demasiado grande. Máximo 50MB"}';
            add_header Content-Type application/json;
        }

        # Archivo no encontrado
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"success": false, "message": "Recurso no encontrado"}';
            add_header Content-Type application/json;
        }
    }
}
